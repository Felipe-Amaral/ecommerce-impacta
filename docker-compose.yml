services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: grafica-app
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: local
      PHP_IDE_CONFIG: serverName=grafica-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  node:
    image: node:22-alpine
    container_name: grafica-node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./app:/var/www/html
      - node-modules:/var/www/html/node_modules
    environment:
      VITE_USE_POLLING: "true"
      VITE_POLL_INTERVAL: "120"
      VITE_HMR_HOST: localhost
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
    ports:
      - "5173:5173"

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: grafica-reverb
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: local
      PHP_IDE_CONFIG: serverName=grafica-app
    ports:
      - "8081:8080"
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: grafica-nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: grafica-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: grafica_ecommerce
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data-v2:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: grafica-redis
    ports:
      - "6380:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: grafica-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mysql-data-v2:
  node-modules:
