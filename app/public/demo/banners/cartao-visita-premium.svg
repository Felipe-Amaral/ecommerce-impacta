<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-label="Banner simbolico de cartao de visita premium">
  <defs>
    <linearGradient id="bg-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ea"/>
      <stop offset="42%" stop-color="#eee5d5"/>
      <stop offset="100%" stop-color="#d9c39a"/>
    </linearGradient>
    <radialGradient id="glow-card-a" cx="18%" cy="18%" r="46%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-card-b" cx="86%" cy="76%" r="50%">
      <stop offset="0%" stop-color="#c8a44a" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#c8a44a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#1a1a1e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b98b2c"/>
      <stop offset="55%" stop-color="#d8b767"/>
      <stop offset="100%" stop-color="#f1da9a"/>
    </linearGradient>
    <filter id="shadow-soft" x="-30%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="shadow-strong" x="-40%" y="-40%" width="200%" height="220%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="blur-ambient">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="700" fill="url(#bg-card)"/>
  <rect width="1600" height="700" fill="url(#glow-card-a)"/>
  <rect width="1600" height="700" fill="url(#glow-card-b)"/>

  <g opacity=".16" filter="url(#blur-ambient)">
    <circle cx="1240" cy="120" r="150" fill="#ffffff"/>
    <circle cx="1360" cy="410" r="200" fill="#c8a44a"/>
    <circle cx="990" cy="600" r="180" fill="#8b6a2a"/>
    <circle cx="340" cy="580" r="180" fill="#ffffff"/>
  </g>

  <!-- workspace strip -->
  <g transform="translate(70 74)" filter="url(#shadow-soft)">
    <rect x="0" y="0" width="1460" height="552" rx="32" fill="#f9f6ef" stroke="#ddcfb5"/>
    <rect x="26" y="24" width="1408" height="504" rx="24" fill="#fcfaf5" stroke="#eee5d4"/>
  </g>

  <!-- dark desk plane -->
  <g transform="translate(134 166)" filter="url(#shadow-strong)">
    <path d="M30 40H1234c26 0 46 19 50 43l30 230c4 29-17 56-47 60L108 414c-26 1-48-18-52-43L6 98c-5-30 18-58 50-58Z" fill="url(#desk)"/>
    <path d="M34 58H1230c15 0 28 10 31 24l27 215c3 17-10 32-27 33L125 372c-15 1-28-9-31-24L46 91c-4-18 10-33 28-33Z" fill="#17181d" stroke="#2a2a31" stroke-opacity=".9"/>
    <path d="M62 80H440" stroke="#d5b15f" stroke-width="4" stroke-linecap="round" opacity=".9"/>
    <path d="M62 102H350" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity=".25"/>
  </g>

  <!-- business card stack -->
  <g transform="translate(220 212)" filter="url(#shadow-strong)">
    <g transform="translate(42 54) rotate(-10)">
      <rect x="0" y="0" width="420" height="242" rx="22" fill="#f7f3ea" stroke="#d9c9aa"/>
      <rect x="18" y="16" width="384" height="208" rx="16" fill="#fcfbf8" stroke="#efe6d5"/>
      <rect x="32" y="36" width="112" height="12" rx="6" fill="url(#gold)"/>
      <rect x="32" y="64" width="260" height="12" rx="6" fill="#23211d" opacity=".84"/>
      <rect x="32" y="88" width="218" height="9" rx="4.5" fill="#6f685c" opacity=".55"/>
      <rect x="32" y="108" width="240" height="9" rx="4.5" fill="#6f685c" opacity=".38"/>
      <rect x="32" y="144" width="154" height="38" rx="14" fill="#181714"/>
      <rect x="196" y="144" width="170" height="38" rx="14" fill="#eee2c8" stroke="#d9bf7c"/>
      <circle cx="336" cy="76" r="40" fill="#f1e4c9"/>
      <circle cx="336" cy="76" r="22" fill="#cfae61" opacity=".85"/>
    </g>

    <g transform="translate(96 10) rotate(7)">
      <rect x="0" y="0" width="420" height="242" rx="22" fill="#121215" stroke="#000000" stroke-opacity=".15"/>
      <rect x="14" y="14" width="392" height="214" rx="16" fill="#16171c" stroke="#d0ac58" stroke-opacity=".32"/>
      <circle cx="86" cy="84" r="38" fill="#1e1f26" stroke="#d2b05d" stroke-width="2"/>
      <path d="M70 86L82 98L104 74" fill="none" stroke="#d7b766" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="142" y="54" width="196" height="16" rx="8" fill="#ffffff" opacity=".95"/>
      <rect x="142" y="82" width="238" height="12" rx="6" fill="#ffffff" opacity=".58"/>
      <rect x="142" y="104" width="208" height="10" rx="5" fill="#ffffff" opacity=".36"/>
      <rect x="38" y="162" width="344" height="42" rx="16" fill="#1d1e24" stroke="#2a2c34"/>
      <rect x="56" y="176" width="102" height="12" rx="6" fill="url(#gold)"/>
      <rect x="170" y="176" width="152" height="12" rx="6" fill="#ffffff" opacity=".85"/>
    </g>

    <!-- stacked edge -->
    <g transform="translate(438 232)">
      <path d="M0 0c24 2 55 10 78 24 20 11 34 27 38 47-59-28-103-37-148-43Z" fill="#e8dcc6"/>
      <path d="M6 14c48 5 90 15 123 35" stroke="#cbb99a" stroke-width="4" stroke-linecap="round" opacity=".8"/>
      <path d="M0 0c-14 0-22 10-18 22 6 17 33 24 70 28" fill="#f8f4ea" opacity=".85"/>
    </g>
  </g>

  <!-- print production cues -->
  <g transform="translate(944 170)" filter="url(#shadow-soft)">
    <rect x="0" y="0" width="500" height="470" rx="24" fill="#ffffff" stroke="#eadfc9"/>
    <rect x="22" y="20" width="456" height="428" rx="18" fill="#fbf9f3" stroke="#eee4d2"/>

    <rect x="36" y="34" width="168" height="14" rx="7" fill="#1b1916" opacity=".9"/>
    <rect x="36" y="58" width="260" height="10" rx="5" fill="#7d7567" opacity=".35"/>

    <!-- die-cut preview board -->
    <g transform="translate(36 92)">
      <rect x="0" y="0" width="428" height="180" rx="16" fill="#f3ead8" stroke="#e2d1ae"/>
      <rect x="18" y="18" width="186" height="126" rx="14" fill="#ffffff" stroke="#e9ddc5"/>
      <rect x="28" y="28" width="94" height="10" rx="5" fill="url(#gold)"/>
      <rect x="28" y="48" width="146" height="10" rx="5" fill="#191714" opacity=".82"/>
      <rect x="28" y="68" width="130" height="8" rx="4" fill="#6e6759" opacity=".42"/>
      <rect x="28" y="92" width="94" height="28" rx="12" fill="#171513"/>
      <rect x="224" y="18" width="186" height="126" rx="14" fill="#17171c" stroke="#d1ae5b" stroke-opacity=".28"/>
      <circle cx="316" cy="81" r="36" fill="#cda856"/>
      <path d="M286 81h60M316 51v60" stroke="#17130f" stroke-opacity=".7" stroke-width="5" stroke-linecap="round"/>
      <!-- cut marks -->
      <path d="M12 12h18M12 12v18M416 12h-18M416 12v18M12 166h18M12 166v-18M416 166h-18M416 166v-18" stroke="#c59f4b" stroke-width="3" stroke-linecap="round" opacity=".7"/>
    </g>

    <!-- CMYK chips and ruler -->
    <g transform="translate(36 292)">
      <rect x="0" y="0" width="428" height="60" rx="14" fill="#ffffff" stroke="#eadfc9"/>
      <rect x="16" y="14" width="44" height="32" rx="10" fill="#02b7e8"/>
      <rect x="66" y="14" width="44" height="32" rx="10" fill="#f542d8"/>
      <rect x="116" y="14" width="44" height="32" rx="10" fill="#ffe33f"/>
      <rect x="166" y="14" width="44" height="32" rx="10" fill="#202020"/>
      <rect x="228" y="14" width="184" height="32" rx="10" fill="#f5efe2" stroke="#e4d4b4"/>
      <path d="M242 30H398" stroke="#a39273" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 7"/>
      <path d="M252 22v16M276 22v16M300 22v16M324 22v16M348 22v16M372 22v16" stroke="#8f7c58" stroke-width="2" opacity=".65"/>
    </g>

    <!-- foil and corner details -->
    <g transform="translate(36 368)">
      <rect x="0" y="0" width="428" height="80" rx="14" fill="#15161b"/>
      <rect x="12" y="12" width="404" height="56" rx="10" fill="#1b1d24" stroke="#d1b064" stroke-opacity=".24"/>
      <path d="M28 28h110" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
      <path d="M28 46h176" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".65"/>
      <path d="M356 16c18 0 32 14 32 32v20h-32c-18 0-32-14-32-32V16Z" fill="#d3b15e"/>
      <path d="M344 24c12 0 24 8 30 18" stroke="#fff4d2" stroke-width="2" opacity=".5" fill="none"/>
    </g>
  </g>

  <g opacity=".18">
    <path d="M0 562c206-40 316 56 500 56 174 0 250-88 434-88 176 0 272 66 666 28v142H0Z" fill="#ffffff"/>
  </g>
</svg>
