<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-label="Banner simbolico de adesivamento em vinil">
  <defs>
    <linearGradient id="bg-wrap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="45%" stop-color="#171a22"/>
      <stop offset="100%" stop-color="#232732"/>
    </linearGradient>
    <radialGradient id="wrapGlowA" cx="14%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#6dd0ff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#6dd0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wrapGlowB" cx="86%" cy="80%" r="48%">
      <stop offset="0%" stop-color="#c8a44a" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#c8a44a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldWrap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b7892c"/>
      <stop offset="60%" stop-color="#d5b566"/>
      <stop offset="100%" stop-color="#f0d691"/>
    </linearGradient>
    <linearGradient id="cyanWrap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42b4ff"/>
      <stop offset="100%" stop-color="#7be2ff"/>
    </linearGradient>
    <filter id="wrapShadow" x="-30%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity=".28"/>
    </filter>
    <filter id="softBlurWrap">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <pattern id="gridFine" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="700" fill="url(#bg-wrap)"/>
  <rect width="1600" height="700" fill="url(#wrapGlowA)"/>
  <rect width="1600" height="700" fill="url(#wrapGlowB)"/>
  <rect width="1600" height="700" fill="url(#gridFine)" opacity=".45"/>

  <g opacity=".14" filter="url(#softBlurWrap)">
    <circle cx="240" cy="160" r="180" fill="#5fcfff"/>
    <circle cx="1280" cy="190" r="220" fill="#c8a44a"/>
    <circle cx="1230" cy="520" r="180" fill="#ffffff"/>
  </g>

  <!-- left panel: storefront / glass adhesive application -->
  <g transform="translate(72 78)" filter="url(#wrapShadow)">
    <rect x="0" y="0" width="662" height="544" rx="30" fill="#151821" stroke="#2a313d"/>
    <rect x="24" y="22" width="614" height="500" rx="22" fill="#1b202b" stroke="#323a48"/>

    <rect x="40" y="38" width="582" height="54" rx="14" fill="#12151c" stroke="#2a303c"/>
    <rect x="58" y="58" width="154" height="12" rx="6" fill="#ffffff" opacity=".14"/>
    <rect x="222" y="58" width="98" height="12" rx="6" fill="url(#goldWrap)" opacity=".9"/>

    <!-- glass area -->
    <g transform="translate(46 106)">
      <rect x="0" y="0" width="570" height="366" rx="18" fill="#12151d" stroke="#2d3644"/>
      <rect x="0" y="0" width="570" height="366" rx="18" fill="url(#gridFine)" opacity=".35"/>

      <!-- adhesive graphics already applied -->
      <path d="M18 302C114 264 170 188 256 160C341 132 438 144 552 92V348H18Z" fill="#0f1218"/>
      <path d="M32 290C122 254 177 188 255 162C333 136 425 144 536 100" stroke="#3ec0ff" stroke-width="18" stroke-linecap="round" opacity=".9"/>
      <path d="M26 325C124 289 186 214 264 186C352 154 448 170 548 122" stroke="#d3af5c" stroke-width="22" stroke-linecap="round" opacity=".92"/>
      <path d="M24 348C122 315 188 244 270 216C360 186 450 194 554 152" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity=".3"/>

      <!-- peeled vinyl corner -->
      <g transform="translate(390 36)" filter="url(#wrapShadow)">
        <path d="M0 0H130V110C88 104 52 86 26 60C12 46 3 25 0 0Z" fill="#232835" stroke="#3b4454"/>
        <path d="M0 0C6 48 40 84 86 104C99 110 114 116 130 118V0Z" fill="#f7f1e3" stroke="#ddc892"/>
        <path d="M8 10C16 44 42 76 76 94" fill="none" stroke="#d8b765" stroke-width="3" stroke-linecap="round" opacity=".7"/>
      </g>

      <!-- squeegee tool -->
      <g transform="translate(86 270) rotate(-9)">
        <rect x="0" y="0" width="126" height="40" rx="14" fill="#f4efe4" stroke="#dfcfb0"/>
        <rect x="10" y="12" width="106" height="14" rx="7" fill="#d3b05e"/>
        <rect x="8" y="30" width="110" height="6" rx="3" fill="#14171f" opacity=".65"/>
      </g>
    </g>
  </g>

  <!-- right panel: wrapped vehicle and vinyl rolls -->
  <g transform="translate(770 96)" filter="url(#wrapShadow)">
    <rect x="0" y="0" width="758" height="508" rx="30" fill="#151821" stroke="#2a313d"/>
    <rect x="26" y="24" width="706" height="460" rx="22" fill="#1a1f2a" stroke="#313948"/>

    <!-- top bar -->
    <rect x="42" y="40" width="622" height="16" rx="8" fill="#ffffff" opacity=".08"/>
    <rect x="42" y="68" width="312" height="10" rx="5" fill="#ffffff" opacity=".16"/>

    <!-- vehicle silhouette -->
    <g transform="translate(34 126)">
      <rect x="0" y="0" width="638" height="300" rx="20" fill="#101319" stroke="#2a313d"/>

      <path d="M58 224c8-62 46-108 112-120l110-20c20-4 41-6 62-6h120c31 0 57 10 76 28l52 48h36c24 0 42 18 42 42v28H58Z" fill="#0c0f14"/>
      <path d="M80 224c8-50 40-88 90-99l104-18c18-3 37-5 55-5h116c25 0 46 8 62 22l52 44h68" fill="none" stroke="#333c4d" stroke-width="5" stroke-linecap="round"/>

      <!-- wrap stripes -->
      <path d="M88 220c18-44 52-73 101-82l128-18c16-2 32-3 49-3h90c18 0 34 6 46 15l53 40c12 9 25 14 40 14h53v34H88Z" fill="#161b25"/>
      <path d="M104 219c20-36 50-58 92-64l122-15c14-2 29-3 44-3h87c14 0 27 4 38 12l50 36c10 7 20 11 32 11h82" stroke="url(#cyanWrap)" stroke-width="16" stroke-linecap="round"/>
      <path d="M96 237c21-40 55-64 101-72l128-17c14-2 29-3 44-3h95c14 0 27 5 39 13l55 38c12 8 23 12 35 12h72" stroke="url(#goldWrap)" stroke-width="20" stroke-linecap="round"/>
      <path d="M110 251c21-34 52-53 92-59l126-15c13-2 26-2 39-2h90c13 0 24 4 34 10l52 32c11 7 22 10 33 10h77" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".25"/>

      <!-- windows -->
      <path d="M308 109h84c18 0 34 5 47 16l24 20H280l18-22c3-4 7-7 10-8Z" fill="#2a3444"/>
      <path d="M180 136c13-17 32-28 54-31l58-8c13-2 25 8 28 21l6 27h-160Z" fill="#2a3444"/>

      <!-- wheels -->
      <g>
        <circle cx="214" cy="224" r="44" fill="#0b0d11" stroke="#394357" stroke-width="5"/>
        <circle cx="214" cy="224" r="22" fill="#bac4d5" opacity=".75"/>
        <circle cx="214" cy="224" r="10" fill="#1b2230"/>
      </g>
      <g>
        <circle cx="518" cy="224" r="44" fill="#0b0d11" stroke="#394357" stroke-width="5"/>
        <circle cx="518" cy="224" r="22" fill="#bac4d5" opacity=".75"/>
        <circle cx="518" cy="224" r="10" fill="#1b2230"/>
      </g>
    </g>

    <!-- vinyl rolls and decals -->
    <g transform="translate(62 408)">
      <rect x="0" y="0" width="250" height="48" rx="16" fill="#0f1218" stroke="#2a313d"/>
      <circle cx="44" cy="24" r="18" fill="#d5b566"/>
      <circle cx="44" cy="24" r="7" fill="#1a1f2a"/>
      <rect x="62" y="12" width="168" height="24" rx="12" fill="#d5b566"/>
      <rect x="70" y="16" width="150" height="16" rx="8" fill="#ebd7a2" opacity=".75"/>
    </g>

    <g transform="translate(330 398)">
      <rect x="0" y="0" width="366" height="64" rx="16" fill="#12161e" stroke="#2a313d"/>
      <rect x="16" y="14" width="70" height="36" rx="12" fill="#1e2531" stroke="#3d4b63"/>
      <path d="M30 34H72" stroke="#73dbff" stroke-width="5" stroke-linecap="round"/>
      <rect x="100" y="12" width="250" height="40" rx="12" fill="#1a202b" stroke="#303a4a"/>
      <path d="M118 30H332" stroke="#ffffff" stroke-opacity=".16" stroke-width="2" stroke-dasharray="5 8" stroke-linecap="round"/>
      <path d="M118 38H230" stroke="#d4b25f" stroke-width="4" stroke-linecap="round"/>
      <path d="M240 38H332" stroke="#4ac2ff" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- diagonal energy strokes -->
  <g opacity=".8">
    <path d="M1180 40 1600 0" stroke="#ffffff" stroke-opacity=".08" stroke-width="8"/>
    <path d="M1230 90 1600 54" stroke="#6bd8ff" stroke-opacity=".16" stroke-width="6"/>
    <path d="M1260 132 1600 98" stroke="#d0ab58" stroke-opacity=".18" stroke-width="6"/>
  </g>

  <g opacity=".13">
    <path d="M0 580c210 28 333-42 516-42 188 0 233 72 430 72 204 0 294-70 654-34v124H0Z" fill="#ffffff"/>
  </g>
</svg>
